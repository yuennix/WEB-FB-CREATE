databases:
  - name: weyn-db
    databaseName: weyn
    user: weyn
    plan: free

services:
  - type: web
    name: weyn-fb
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weyn-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false
