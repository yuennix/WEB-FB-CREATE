<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEYN — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060a12;
    color: #e2e8f0;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(245,158,11,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(0,230,118,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: linear-gradient(160deg, rgba(18,26,48,0.92) 0%, rgba(10,15,26,0.92) 100%);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 44px 40px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    box-shadow: 0 32px 72px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,158,11,0.06);
  }

  .logo { text-align: center; }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    color: #000;
    letter-spacing: -1px;
    margin-bottom: 16px;
    box-shadow: 0 0 0 8px rgba(245,158,11,0.08), 0 12px 32px rgba(245,158,11,0.35);
  }

  .logo-name {
    font-size: 24px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.8px;
  }

  .logo-sub {
    font-size: 12px;
    color: #64748b;
    margin-top: 5px;
    font-weight: 500;
  }

  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: #64748b;
    display: block;
    margin-bottom: 7px;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    color: #e2e8f0;
    padding: 13px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  input[type="password"]:focus {
    border-color: rgba(245,158,11,0.45);
    box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
    background: rgba(245,158,11,0.02);
  }
  input::placeholder { color: #2d3f55; font-weight: 400; }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    letter-spacing: 0.1px;
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(245,158,11,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn:active { transform: translateY(0); }

  .err {
    font-size: 13px;
    color: #f87171;
    text-align: center;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 8px;
    padding: 10px;
    display: none;
  }
  .err.visible { display: block; }

  .back-link {
    text-align: center;
    font-size: 12px;
    color: #334155;
  }
  .back-link a {
    color: #475569;
    text-decoration: none;
    transition: color .2s;
  }
  .back-link a:hover { color: #94a3b8; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">W</div>
    <div class="logo-name">WEYN</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  <div>
    <label class="field-label">Admin Password</label>
    <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()">
  </div>
  <button class="btn" onclick="login()">Enter Admin</button>
  <div class="err" id="err">Wrong password. Try again.</div>
  <div class="back-link"><a href="/">← Back to user view</a></div>
</div>
<script>
async function login() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.classList.remove('visible');
  const r = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw }),
  });
  if (r.ok) {
    window.location.reload();
  } else {
    err.classList.add('visible');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
